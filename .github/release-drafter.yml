name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
tag-prefix: 'v'
version-template: '$MAJOR.$MINOR.$PATCH'
draft: true
prerelease: false

sort-by: merged_at
sort-direction: descending
pull-request-limit: 25
history-limit: 25

no-changes-template: '- No changes.'
no-contributors-template: 'No contributors.'
category-template: '## $TITLE'
change-template: '- [$TITLE]($URL) by @$AUTHOR'
change-title-escapes: '\<*_&`#@'

exclude-contributors:
  - github-actions
  - github-actions[bot]
  - dependabot
  - dependabot[bot]

exclude-labels:
  - skip-changelog
  - State One
  - State Two

categories:
  - title: 'Breaking Changes'
    collapse-after: -1
    labels:
      - breaking-change

  - title: 'Enhancements'
    collapse-after: 10
    labels:
      - enhancement

  - title: 'Fixes'
    collapse-after: 10
    labels:
      - bug

  - title: 'Performance'
    collapse-after: 8
    labels:
      - Performance

  - title: 'Architecture'
    collapse-after: 8
    labels:
      - Architecture

  - title: 'Renderer'
    collapse-after: 8
    labels:
      - Renderer

  - title: 'Gpu'
    collapse-after: 8
    labels:
      - Gpu

  - title: 'Layout'
    collapse-after: 8
    labels:
      - Layout

  - title: 'Tests'
    collapse-after: 8
    labels:
      - tests

  - title: 'Documentation'
    collapse-after: 8
    labels:
      - documentation

  - title: 'CI'
    collapse-after: 8
    labels:
      - ci

  - title: 'Tasks'
    collapse-after: 8
    labels:
      - task

  - title: 'Other Changes'
    collapse-after: 8

version-resolver:
  major:
    labels:
      - breaking-change
  minor:
    labels:
      - enhancement
  patch:
    labels:
      - bug
  default: patch

template: |
  $CHANGES

footer: |
  ## Contributors

  $CONTRIBUTORS

  ## Links

  - Full changelog: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
