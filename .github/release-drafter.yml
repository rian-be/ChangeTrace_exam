name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: 'Breaking Changes'
    labels:
      - breaking-change
  - title: 'Features'
    labels:
      - enhancement
  - title: 'Architecture'
    labels:
      - Architecture
  - title: 'Rendering'
    labels:
      - Renderer
      - Gpu
      - Layout
  - title: 'Performance'
    labels:
      - Performance
  - title: 'Bug Fixes'
    labels:
      - bug
  - title: 'Tests'
    labels:
      - tests
  - title: 'Documentation'
    labels:
      - documentation
  - title: 'CI'
    labels:
      - ci
  - title: 'Tasks'
    labels:
      - task

change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - breaking-change
  minor:
    labels:
      - enhancement
      - Architecture
      - Renderer
      - Gpu
      - Layout
      - Performance
  patch:
    labels:
      - bug
      - ci
      - tests
  default: patch

template: |
  ## Changes

  $CHANGES
