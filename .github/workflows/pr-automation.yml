name: Pull Request Labeler

on:
  pull_request_target:
    types: [ opened, edited, synchronize, reopened ]

permissions:
  contents: read
  pull-requests: write

jobs:
  labeler:
    runs-on: ubuntu-latest

    steps:
      - name: Label changed files
        uses: actions/labeler@v6
        with:
          configuration-path: .github/labeler.yml
          sync-labels: true
