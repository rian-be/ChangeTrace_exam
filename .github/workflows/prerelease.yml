name: Pre Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Pre-release tag, for example v0.62.24-pre.1"
        required: true
        type: string
      release_name:
        description: "Release title. Defaults to tag name."
        required: false
        type: string
  push:
    tags:
      - "v*-pre*"
      - "v*-alpha*"
      - "v*-beta*"
      - "v*-rc*"

permissions:
  contents: write
  pull-requests: read
  id-token: write
  attestations: write

jobs:
  publish:
    uses: ./.github/workflows/publish-artifacts.yml

  release:
    name: Create GitHub pre-release
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve release metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ inputs.tag_name }}"
            RELEASE_NAME="${{ inputs.release_name }}"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
            RELEASE_NAME=""
          fi

          if [ -z "$RELEASE_NAME" ]; then
            RELEASE_NAME="$TAG_NAME"
          fi

          if ! echo "$TAG_NAME" | grep -Eq '^v[0-9]+(\.[0-9]+){1,2}-(pre|alpha|beta|rc)(\.[0-9]+)?$'; then
            echo "Tag must be a pre-release tag like v0.62.24-pre.1, v0.62.24-alpha.1, v0.62.24-beta.1, or v0.62.24-rc.1"
            exit 1
          fi

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "release_version=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums
        run: |
          cd dist
          sha256sum ChangeTrace-*.zip > SHA256SUMS.txt

      - name: Draft pre-release notes
        uses: release-drafter/release-drafter@v7
        with:
          config-name: release-drafter.yml
          tag: ${{ steps.meta.outputs.tag_name }}
          version: ${{ steps.meta.outputs.release_version }}
          name: ${{ steps.meta.outputs.release_name }}
          prerelease: true
          publish: true
          latest: false
          commitish: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload pre-release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.meta.outputs.tag_name }}
        run: |
          gh release upload "$TAG_NAME" dist/ChangeTrace-*.zip dist/SHA256SUMS.txt --clobber
