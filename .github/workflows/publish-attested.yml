name: Publish Attested

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  publish:
    uses: ./.github/workflows/publish-artifacts.yml

  release:
    name: Upload artifacts to draft release
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Download published artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: ChangeTrace-*
          path: dist
          merge-multiple: true

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          release_tag="$(gh api "repos/$GH_REPO/releases" \
            --jq '[.[] | select(.draft == true)][0].tag_name')"

          if [ -z "$release_tag" ]; then
            echo "No draft release found. Release Drafter must create the draft before artifacts can be uploaded."
            exit 1
          fi

          if gh release view "$release_tag" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release edit "$release_tag" \
              --repo "$GH_REPO" \
              --draft=true \
              --title "$release_tag"
          fi

          gh release upload "$release_tag" dist/* --clobber --repo "$GH_REPO"
