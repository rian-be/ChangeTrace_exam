name: Shader Check

on:
  pull_request:
    paths:
      - "Assets/Shaders/**"
      - "src/Graphics/Shaders/**"
      - "src/Graphics/Gpu/**"
      - "src/Graphics/Rendering/**"
      - ".github/workflows/shader-check.yml"

  push:
    branches:
      - main
      - master
      - develop
    paths:
      - "Assets/Shaders/**"
      - "src/Graphics/Shaders/**"
      - "src/Graphics/Gpu/**"
      - "src/Graphics/Rendering/**"

permissions:
  contents: read

jobs:
  shader-check:
    name: Shader validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ChangeTrace.csproj

      - name: Build
        run: dotnet build ChangeTrace.csproj -c Release --no-restore

      - name: Validate shader directory
        run: |
          test -d Assets/Shaders

      - name: Validate shader files exist
        run: |
          SHADER_COUNT=$(find Assets/Shaders -type f \( -name "*.vert" -o -name "*.frag" -o -name "*.comp" \) | wc -l)

          echo "Shader files found: $SHADER_COUNT"

          if [ "$SHADER_COUNT" -eq 0 ]; then
            echo "No shader files found."
            exit 1
          fi

      - name: Detect empty shaders
        run: |
          EMPTY_FILES=$(find Assets/Shaders -type f \( -name "*.vert" -o -name "*.frag" -o -name "*.comp" \) -size 0)

          if [ -n "$EMPTY_FILES" ]; then
            echo "Empty shader files detected:"
            echo "$EMPTY_FILES"
            exit 1
          fi

      - name: Detect missing version directives
        run: |
          MISSING_VERSION=$(find Assets/Shaders -type f \( -name "*.vert" -o -name "*.frag" -o -name "*.comp" \) -exec grep -L "^#version" {} \;)

          if [ -n "$MISSING_VERSION" ]; then
            echo "Shaders missing #version directive:"
            echo "$MISSING_VERSION"
            exit 1
          fi

      - name: Validate compute shaders have local size
        run: |
          BROKEN_COMP=$(find Assets/Shaders -type f -name "*.comp" -exec grep -L "layout(local_size" {} \;)

          if [ -n "$BROKEN_COMP" ]; then
            echo "Compute shaders missing layout(local_size_x/y/z):"
            echo "$BROKEN_COMP"
            exit 1
          fi

      - name: Validate shader manifest references
        run: |
          if [ ! -f src/Graphics/Shaders/Registry/ShaderManifest.cs ]; then
            echo "ShaderManifest.cs not found."
            exit 1
          fi

          echo "Shader manifest found."

      - name: Detect obvious unresolved shader names
        run: |
          echo "Checking shader references..."

          grep -R "Shaders.Graphics(\"" src/Graphics src/Rendering || true
          grep -R "Shaders.Compute(\"" src/Graphics src/Rendering || true

      - name: Validate shader assets are copied by project
        run: |
          if ! grep -q "Assets/\*\*/\*" ChangeTrace.csproj; then
            echo "ChangeTrace.csproj may not include Assets/**/* for output copy."
            exit 1
          fi