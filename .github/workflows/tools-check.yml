name: Tools Check

on:
  pull_request:
    paths:
      - "Tools/**"

  push:
    paths:
      - "Tools/**"

permissions:
  contents: read

jobs:
  tools:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build Tools
        run: dotnet build Tools/ChangeTrace.Tools.csproj -c Release --no-restore